<!DOCTYPE html>
<html lang="ar">
<head>
<meta name="description" content="Read the best and latest comics including Marvel, DC, and independent creators. Download and enjoy high-quality comics for free!">
<meta name="keywords" content="Comics, Marvel Comics, DC Comics, Download Comics, Free Comics, Infinity Comics, Online Comics">
<meta name="author" content="Infinity Comics - Mohamed Hassan">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Language" content="en">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://yourdomain.com/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POOLUMINATI (2025) #1</title>
    <link rel="icon" type="image/png" href="imags comics/favicon-16x16.png">  
    <link rel="stylesheet" href="styledare.css">
</head>
<body>

    <header>
            <div class="logo">
                <a href="index.html">
            <img src="imags comics/Marvel_Logo.svg.png" alt="Marvel Logo">
        </div>
        <nav class="nav-links">
            <ul>
                <li><a href="index.html">HOME</a></li>

            </ul>
        </nav>
    </header>

    <main class="comic-container">
        <div class="comic-image">
            <img src="imags comics/POOLUMINATI.jpg" alt="Daredevil #1">
        </div>
        <div class="comic-details">
            <h1>POOLUMINATI (2025) #1</h1>
            <p class="Published"><strong>Published:</strong> March 26, 2025</p>
            <p class="WRITER"><strong>WRITER:</strong> Zac GormanAlexis Quasarano</p>
            <p class="Penciller"><strong>Penciller:</strong> Enid BalamTodd Nauck</p>
            <p class="bio">   </p>

            <div class="buttons">
                </div>
                
                
                
                <a href="https://www.mediafire.com/file/1f96vcxw4m1xo27/Pooluminati_001_%25282025%2529_%2528Digital%2529_%2528Kileko-Empire%2529.cbz/file" download class="btn download">Download </a>
            </div>
        </div>
    </main>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let comics = [
                { img: "images/comics/sw.jpg", title: "Sam Wilson, Captain America (2025)", link: "sam.html" },
                { img: "images/comics/dd.jpg", title: "Daredevil Facsimile Edition (2025)", link: "dare.html" },
                { img: "images/comics/red-hulk.jpg", title: "Red Hulk (2025)", link: "red.html" }
            ];
    
            let container = document.querySelector(".comics-container");
    
            comics.forEach(comic => {
                let comicDiv = document.createElement("div");
                comicDiv.classList.add("comic");
    
                comicDiv.innerHTML = `
                    <a href="${comic.link}">
                        <img src="${comic.img}" alt="${comic.title}">
                    </a>
                    <div class="comic-buttons">
                        <a href="${comic.link}" class="button">${comic.title}</a>
                    </div>
                `;
    
                container.appendChild(comicDiv);
            });
        });
    </script>
    
</body>
</html>
