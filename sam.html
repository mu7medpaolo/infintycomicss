<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom's Division (2025)</title>
    <meta name="description" content="Read the best and latest comics including Marvel, DC, and independent creators">
    <meta name="keywords" content="Comics, Marvel Comics, DC Comics, Download Comics">
    <meta name="author" content="Infinity Comics - Mohamed Hassan">
    <link rel="icon" type="image/png" href="imags comics/favicon-16x16.png">
    <link rel="stylesheet" href="styledare.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="index.html">
                    <img src="imags comics/Marvel_Logo.svg.png" alt="Marvel Logo">
                </a>
            </div>
            <nav class="nav-links">
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="about.html">ABOUT</a></li>
                </ul>
            </nav>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search comics...">
                <button id="searchButton"><i class="fas fa-search"></i></button>
            </div>
            <button id="dark-mode-toggle">Dark Mode🌙</button>
        </div>
    </header>

    <main class="comic-container">
        <div class="comic-image">
            <img src="imags comics/Doom's Division.jpg" alt="Doom's Division (2025)">
        </div>
        <div class="comic-details">
            <h1>Doom's Division (2025) #1</h1>
            <p class="Published"><strong>Published:</strong> March 26, 2025</p>
            <p class="WRITER"><strong>WRITER:</strong> Yoon Ha Lee</p>
            <p class="Penciller"><strong>Penciller:</strong> Minkyu Jung</p>
            <div class="buttons">
                <a href="https://www.mediafire.com/file/7v21no5q2h8lteu/Doom%2527s_Division_001_%25282025%2529_%2528Digital%2529_%2528Shan-Empire%2529.cbz/file" download class="btn download">Download</a>
            </div>
        </div>
    </main>

    <script>
      // Dark Mode Functionality
document.addEventListener('DOMContentLoaded', function() {
    const darkModeToggle = document.getElementById('dark-mode-toggle');
    const body = document.body;
    
    // Check for saved dark mode preference
    if (localStorage.getItem('darkMode') === 'enabled') {
        body.classList.add('dark-mode');
        darkModeToggle.textContent = 'Light Mode☀️';
    }
    
    // Toggle dark mode
    darkModeToggle.addEventListener('click', () => {
        body.classList.toggle('dark-mode');
        const isDarkMode = body.classList.contains('dark-mode');
        
        darkModeToggle.textContent = isDarkMode ? 'Light Mode☀️' : 'Dark Mode🌙';
        localStorage.setItem('darkMode', isDarkMode ? 'enabled' : 'disabled');
    });
    
    // Search Functionality
    const searchButton = document.getElementById('searchButton');
    searchButton.addEventListener('click', function() {
        const searchTerm = document.getElementById('searchInput').value.trim();
        if (searchTerm) {
            alert(`Searching for: ${searchTerm}`);
            // Here you would implement actual search functionality
            // window.location.href = `search.html?q=${encodeURIComponent(searchTerm)}`;
        }
    });
    
    // Search on Enter key
    document.getElementById('searchInput').addEventListener('keyup', function(event) {
        if (event.key === 'Enter') {
            searchButton.click();
        }
    });
});
    </script>
</body>
</html>
