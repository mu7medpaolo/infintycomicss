<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Store</title>
    <link rel="stylesheet" href="storestyle.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html">
                <img src="images/Marvel_Logo.svg.png" alt="Marvel Logo">
            </a>
        </div>
        <nav class="nav-links">
            <ul>
                <li><a href="index.html" class="Home1">Home</a></li>
                <li><a href="store.html" class="store1">Store</a></li>
            </ul>
        </nav>
    </header>
    
    <div class="store-container">
        <aside class="filters">
            <h2>Filter</h2>
            <div class="filter-section">
                <h3>Product Type</h3>
                <label><input type="checkbox"> Pins</label><br>
                <label><input type="checkbox"> Shoes</label><br>
                <label><input type="checkbox"> Backpacks</label>
            </div>
            <div class="filter-section">
                <h3>Price</h3>
                <input type="range" min="10" max="200">
            </div>
        </aside>
        
        <main class="products">
            <div class="product">
                <img src="images/red-hulk-pin.jpg" alt="Red Hulk Pin">
                <h3>Red Hulk Pin</h3>
                <p class="price">$19.99</p>
                <a href="#" class="buy-button">Buy Now</a>
            </div>
            <div class="product">
                <img src="images/captain-america-crocs.jpg" alt="Captain America Crocs">
                <h3>Captain America Crocs</h3>
                <p class="price">$89.99</p>
                <a href="#" class="buy-button">Buy Now</a>
            </div>
            <div class="product">
                <img src="images/captain-backpack.jpg" alt="Captain America Backpack">
                <h3>Captain America Backpack</h3>
                <p class="price">$90.00</p>
                <a href="#" class="buy-button">Buy Now</a>
            </div>
        </main>
    </div>
    
    <footer>
        <div class="footer-container">
            <div class="footer-logo">
                <img src="images/Marvel_Logo.svg.png" alt="Logo"> 
            </div>
            <div class="footer-links">
                <ul>
                    <li><a href="#">ABOUT</a></li>
                </ul>
            </div>
            <div class="footer-social">
                <h3>FOLLOW US</h3>
                <div class="social-icons">
                    <a href="https://www.facebook.com/profile.php?id=61573608733528" class="face"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-youtube"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2025 Infinity Comics. All Rights Reserved.</p>
            <ul>
                <li><a href="#">Terms of Use</a></li>
                <li><a href="#">Privacy Policy</a></li>
                <li><a href="#">License Agreement</a></li>
            </ul>
        </div>
    </footer>
</body>
</html>
